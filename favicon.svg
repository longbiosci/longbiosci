  <rect width="32" height="32" rx="6" fill="#1a3a5c"/>
  <!-- Helix strand 1 -->
  <path d="M8 6 C12 10, 20 10, 24 14 C20 18, 12 18, 8 22 C12 26, 20 26, 24 26"
        stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Helix strand 2 -->
  <path d="M24 6 C20 10, 12 10, 8 14 C12 18, 20 18, 24 22 C20 26, 12 26, 8 26"
        stroke="#81d4fa" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- Cross bars -->
  <line x1="8" y1="10" x2="24" y2="10" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="22" x2="24" y2="22" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="14" x2="24" y2="14" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="8" y1="18" x2="24" y2="18" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
