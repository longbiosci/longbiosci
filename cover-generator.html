<!DOCTYPE html>
<html>
<head>

    <title>每日简报</title>

        body {

            width: 1200px; height: 630px;
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            display: flex; align-items: center; justify-content: center;

        h1 { color: #e94560; font-size: 52px; margin-bottom: 10px; }

        .tagline { color: #333; font-size: 22px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🧬 长寿科技简报</h1>
        <div class="date">第12期 · 2026年3月11日</div>
        <div class="tagline">抗衰老研究前沿 · 每日更新</div>
    </div>
</body>
</html>
